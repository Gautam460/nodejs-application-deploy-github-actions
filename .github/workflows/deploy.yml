name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Build and Prepare Deployment
        run: |
          # 1. Install dependencies
          npm install --legacy-peer-deps
          
          # 2. Build the Frontend
          npm run build
          
          # 3. Create a clean deployment package
          mkdir deploy_package
          
          # 4. Copy build files and backend
          cp -R dist/* deploy_package/
          cp -R backend deploy_package/
          cp .htaccess deploy_package/ || true
          
          # 5. Remove local node_modules
          rm -rf deploy_package/backend/node_modules

      - name: Upload to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "deploy_package/"
          target: "/home/princegarments/public_html"
          strip_components: 1

      - name: Start App with PM2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            cd /home/princegarments/public_html/backend
            npm install
            pm2 stop backend || true
            NODE_ENV=production pm2 start npm --name "backend" -- run start
            pm2 save