name: Deploy to Server

on:
  push:
    branches:
      - master

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20' # Using standard node version

      - name: Build and Prepare Deployment
        run: |
          # 1. Build the Frontend at root
          npm install
          npm run build
          
          # 2. Create a clean deployment folder
          mkdir deploy_package
          
          # 3. Copy only what the server needs
          cp -R dist/* deploy_package/
          cp -R backend deploy_package/
          cp .htaccess deploy_package/ || true
          
          # 4. Remove node_modules from backend to save upload time
          rm -rf deploy_package/backend/node_modules

      - name: Upload Files to Server
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          source: "deploy_package/"
          target: "/home/princegarments/public_html"
          strip_components: 1

      - name: Start Backend with PM2
        uses: appleboy/ssh-action@v1.1.0
        with:
          host: ${{ secrets.SSH_HOST }}
          username: ${{ secrets.SSH_USERNAME }}
          password: ${{ secrets.SSH_PASSWORD }}
          port: 22
          script: |
            # Navigate to backend folder
            cd /home/princegarments/public_html/backend
            
            # Install backend dependencies
            npm install
            
            # Stop any existing PM2 processes to avoid conflicts
            pm2 stop all || true
            
            # Start the backend using PM2
            pm2 start npm --name "backend" -- run start
            
            # Save PM2 process list to restart on server reboot
            pm2 save